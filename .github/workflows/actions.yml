# https://github.com/julia-actions/cache#usage
name: CI

on:
  push:
    paths-ignore:
      - README.md
      - 'docs/**'
  pull_request:

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

jobs:
  Test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: [1.12.5]         # 2026-02-09
        julia-arch: [x64]
        os: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: julia-actions/setup-julia@v1
      with:
        version: ${{ matrix.julia-version }}
    - uses: julia-actions/cache@v1
    - name: sources
      run: |
        mkdir -p sources/
        cd sources/
        git clone --depth=1 https://github.com/aviatesk/JETLS.jl JETLS
        julia -e 'using Pkg; Pkg.develop(path = "JETLS")'
        cd ../
    - uses: julia-actions/julia-buildpkg@v1
  # - uses: julia-actions/julia-runtest@v1
    - name: runtests
      run: |
        julia --project=. -e 'using Pkg; Pkg.test(; coverage=false, julia_args=["--check-bounds=yes", "--compiled-modules=yes", "--depwarn=yes"], force_latest_compatible_version=false, allow_reresolve=true)'
    - name: JETLS check
      run: |
        julia -e 'using Pkg; Pkg.add("Jive")'
        julia --startup-file=no --project=. -m JETLS check test/
